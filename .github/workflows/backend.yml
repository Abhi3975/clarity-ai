name: Deploy Backend to Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic httpx
          pip install -r requirements.txt --no-deps 2>/dev/null || true

      - name: Syntax check
        run: python -c "import ast; ast.parse(open('main.py').read()); print('Syntax OK')"

      - name: Start server (smoke test)
        run: |
          timeout 10 python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health || echo "Health check failed"
        continue-on-error: true
